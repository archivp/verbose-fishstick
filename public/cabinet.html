<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Кабинет</title><link rel="stylesheet" href="/style.css"></head><body><nav class="nav"><a class="brand" href="/">◉ Kekwcirclegame S2</a><div class="links" id="navLinks"></div></nav><main class="container"><h1>Личный кабинет</h1><div class="grid"><section class="card" id="profile"></section><section class="card"><h2>Редактировать профиль</h2><form id="nickForm"><input id="nickname" placeholder="Ник"><button class="btn ok">Сохранить ник</button></form><form id="avatarForm"><input name="avatar" type="file" accept="image/*"><button class="btn">Загрузить аватар</button></form><p id="msg" class="msg"></p></section></div><section class="card" style="margin-top:20px"><div class="section-head"><div><h2>Пул игр профиля</h2><p class="muted">Нажми кнопку, чтобы случайно получить до 20 игр из общего списка. Пул будет закреплён в профиле.</p></div><button class="btn ok" id="rollPoolBtn">Роллить пул</button></div><table><thead><tr><th>#</th><th>Игра</th><th>Очки</th><th>Статус</th></tr></thead><tbody id="poolRows"></tbody></table></section><section class="card" style="margin-top:20px"><h2>Пройденные игры</h2><table><thead><tr><th>Игра</th><th>Очки</th><th>Дата</th></tr></thead><tbody id="completed"></tbody></table></section></main><script src="/app.js"></script></body></html>
